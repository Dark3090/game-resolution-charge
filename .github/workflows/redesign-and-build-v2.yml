name: Redesign UI + Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # CORES / AMOLED
      # ─────────────────────────────────────────
      - name: Rewrite colors.xml
        run: |
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_amoled">#FF000000</color>
              <color name="surface_1">#FF0D0D0D</color>
              <color name="surface_2">#FF141414</color>
              <color name="surface_3">#FF1A1A1A</color>
              <color name="surface_4">#FF212121</color>
              <color name="primary">#FF00E5CC</color>
              <color name="primary_dim">#FF00B5A0</color>
              <color name="primary_container">#FF003730</color>
              <color name="on_primary">#FF000000</color>
              <color name="on_primary_container">#FF6FF7E8</color>
              <color name="secondary">#FFFFB74D</color>
              <color name="secondary_container">#FF3D2800</color>
              <color name="on_secondary_container">#FFFFD9A3</color>
              <color name="error">#FFFF5449</color>
              <color name="error_container">#FF3B0008</color>
              <color name="on_error_container">#FFFFB4AC</color>
              <color name="on_surface">#FFE8E8E8</color>
              <color name="on_surface_variant">#FF939393</color>
              <color name="outline">#FF303030</color>
              <color name="purple_200">#FFBB86FC</color>
              <color name="purple_500">#FF6200EE</color>
              <color name="purple_700">#FF3700B3</color>
              <color name="blue_500">#1E88E5</color>
              <color name="teal_200">#FF03DAC5</color>
              <color name="teal_700">#FF018786</color>
              <color name="black">#FF000000</color>
              <color name="white">#FFFFFFFF</color>
              <color name="reset_button_text">#FF000000</color>
              <color name="button_dark_blue">#FF0D47A1</color>
          </resources>
          EOF

      # ─────────────────────────────────────────
      # TEMA — AMOLED
      # ─────────────────────────────────────────
      - name: Rewrite themes.xml
        run: |
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.YourAppName" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
                  <item name="android:windowBackground">@color/bg_amoled</item>
                  <item name="android:colorBackground">@color/bg_amoled</item>
                  <item name="colorSurface">@color/surface_1</item>
                  <item name="colorPrimary">@color/primary</item>
                  <item name="colorSecondary">@color/secondary</item>
                  <item name="android:navigationBarColor">@color/bg_amoled</item>
                  <item name="android:statusBarColor">@color/bg_amoled</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowLightNavigationBar">false</item>
                  <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>
                  <item name="android:textColorPrimary">@color/on_surface</item>
                  <item name="android:textColorSecondary">@color/on_surface_variant</item>
              </style>
              <style name="MyRoundedDialog" parent="ThemeOverlay.MaterialComponents.MaterialAlertDialog">
                  <item name="shapeAppearanceOverlay">@style/ShapeAppearance.MyRoundedCorner</item>
                  <item name="colorPrimary">@color/primary</item>
                  <item name="colorSecondary">@color/primary</item>
                  <item name="android:background">@color/surface_1</item>
              </style>
              <style name="ShapeAppearance.MyRoundedCorner" parent="">
                  <item name="cornerFamily">rounded</item>
                  <item name="cornerSize">24dp</item>
              </style>
          </resources>
          EOF

      # ─────────────────────────────────────────
      # TELA PRINCIPAL
      # ─────────────────────────────────────────
      - name: Rewrite activity_main.xml
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:id="@+id/rootLayout"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="@color/bg_amoled"
              android:fitsSystemWindows="true">

              <androidx.appcompat.widget.Toolbar
                  android:id="@+id/myToolbar"
                  android:layout_width="match_parent"
                  android:layout_height="64dp"
                  android:background="@color/bg_amoled"
                  android:paddingStart="8dp"
                  android:paddingEnd="8dp"
                  app:titleTextColor="@color/on_surface"
                  app:title="GameResChange"
                  app:popupTheme="@style/ThemeOverlay.MaterialComponents.Dark" />

              <!-- SEARCH BAR -->
              <com.google.android.material.textfield.TextInputLayout
                  android:id="@+id/searchLayout"
                  style="@style/Widget.MaterialComponents.TextInputLayout.OutlinedBox"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_marginStart="16dp"
                  android:layout_marginEnd="16dp"
                  android:layout_marginBottom="8dp"
                  app:boxCornerRadiusTopStart="28dp"
                  app:boxCornerRadiusTopEnd="28dp"
                  app:boxCornerRadiusBottomStart="28dp"
                  app:boxCornerRadiusBottomEnd="28dp"
                  app:boxStrokeColor="@color/outline"
                  app:boxBackgroundColor="@color/surface_2"
                  app:hintTextColor="@color/on_surface_variant"
                  app:startIconDrawable="@drawable/ic_search"
                  app:startIconTint="@color/on_surface_variant">

                  <com.google.android.material.textfield.TextInputEditText
                      android:id="@+id/searchInput"
                      android:layout_width="match_parent"
                      android:layout_height="52dp"
                      android:hint="Buscar apps…"
                      android:imeOptions="actionSearch"
                      android:inputType="text"
                      android:textColor="@color/on_surface"
                      android:textColorHint="@color/on_surface_variant"
                      android:background="@null" />
              </com.google.android.material.textfield.TextInputLayout>

              <!-- FILTER CHIPS -->
              <HorizontalScrollView
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:scrollbars="none"
                  android:paddingStart="16dp"
                  android:paddingEnd="16dp"
                  android:paddingBottom="12dp">
                  <com.google.android.material.chip.ChipGroup
                      android:id="@+id/chipGroup"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      app:singleSelection="true"
                      app:selectionRequired="true">
                      <com.google.android.material.chip.Chip
                          android:id="@+id/chipAll"
                          style="@style/Widget.MaterialComponents.Chip.Filter"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="Todos"
                          android:textColor="@color/on_surface_variant"
                          app:chipBackgroundColor="@color/surface_2"
                          app:chipStrokeColor="@color/outline"
                          app:chipStrokeWidth="1.5dp" />
                      <com.google.android.material.chip.Chip
                          android:id="@+id/chipModified"
                          style="@style/Widget.MaterialComponents.Chip.Filter"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="Modificados"
                          android:checked="true"
                          android:textColor="@color/on_surface_variant"
                          app:chipBackgroundColor="@color/surface_2"
                          app:chipStrokeColor="@color/outline"
                          app:chipStrokeWidth="1.5dp" />
                      <com.google.android.material.chip.Chip
                          android:id="@+id/chipGames"
                          style="@style/Widget.MaterialComponents.Chip.Filter"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="Games"
                          android:textColor="@color/on_surface_variant"
                          app:chipBackgroundColor="@color/surface_2"
                          app:chipStrokeColor="@color/outline"
                          app:chipStrokeWidth="1.5dp" />
                  </com.google.android.material.chip.ChipGroup>
              </HorizontalScrollView>

              <!-- STATUS BANNER (controlado pelo Kotlin) -->
              <com.google.android.material.card.MaterialCardView
                  android:id="@+id/statusBanner"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_marginStart="16dp"
                  android:layout_marginEnd="16dp"
                  android:layout_marginBottom="8dp"
                  app:cardBackgroundColor="@color/primary_container"
                  app:cardCornerRadius="16dp"
                  app:strokeColor="@color/primary_dim"
                  app:strokeWidth="1dp"
                  app:cardElevation="0dp">
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:padding="12dp"
                      android:gravity="center_vertical">
                      <com.google.android.material.card.MaterialCardView
                          android:layout_width="36dp"
                          android:layout_height="36dp"
                          app:cardBackgroundColor="#26000000"
                          app:cardCornerRadius="12dp"
                          app:cardElevation="0dp">
                          <ImageView
                              android:id="@+id/statusIcon"
                              android:layout_width="20dp"
                              android:layout_height="20dp"
                              android:layout_gravity="center"
                              android:src="@drawable/ic_gear"
                              android:tint="@color/primary" />
                      </com.google.android.material.card.MaterialCardView>
                      <LinearLayout
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:orientation="vertical"
                          android:paddingStart="12dp">
                          <TextView
                              android:id="@+id/statusLabel"
                              android:layout_width="wrap_content"
                              android:layout_height="wrap_content"
                              android:text="Verificando módulo…"
                              android:textColor="@color/on_primary_container"
                              android:textSize="13sp"
                              android:textStyle="bold" />
                          <TextView
                              android:id="@+id/statusSub"
                              android:layout_width="wrap_content"
                              android:layout_height="wrap_content"
                              android:text="Xposed rodando · Modo Padrão"
                              android:textColor="@color/on_surface_variant"
                              android:textSize="12sp" />
                      </LinearLayout>
                  </LinearLayout>
              </com.google.android.material.card.MaterialCardView>

              <!-- CONTROLES -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:gravity="center_vertical"
                  android:paddingStart="20dp"
                  android:paddingEnd="16dp"
                  android:paddingTop="4dp"
                  android:paddingBottom="8dp">
                  <com.google.android.material.switchmaterial.SwitchMaterial
                      android:id="@+id/toggleModified"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="Só modificados"
                      android:textColor="@color/on_surface_variant"
                      android:textSize="13sp" />
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/resetButton"
                      style="@style/Widget.MaterialComponents.Button.OutlinedButton"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Reset All"
                      android:textSize="12sp"
                      android:textColor="@color/secondary"
                      app:strokeColor="@color/outline"
                      app:iconTint="@color/secondary" />
              </LinearLayout>

              <androidx.recyclerview.widget.RecyclerView
                  android:id="@+id/appList"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:paddingStart="8dp"
                  android:paddingEnd="8dp"
                  android:paddingBottom="80dp"
                  android:clipToPadding="false" />

          </LinearLayout>
          EOF

      # ─────────────────────────────────────────
      # ITEM DA LISTA
      # ─────────────────────────────────────────
      - name: Rewrite item_app.xml
        run: |
          cat > app/src/main/res/layout/item_app.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <com.google.android.material.card.MaterialCardView
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:id="@+id/itemCard"
              android:layout_width="match_parent"
              android:layout_height="wrap_content"
              android:layout_marginBottom="2dp"
              app:cardBackgroundColor="@color/bg_amoled"
              app:cardCornerRadius="24dp"
              app:cardElevation="0dp"
              app:strokeWidth="0dp">
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:padding="10dp"
                  android:gravity="center_vertical">
                  <FrameLayout
                      android:layout_width="52dp"
                      android:layout_height="52dp">
                      <com.google.android.material.card.MaterialCardView
                          android:layout_width="52dp"
                          android:layout_height="52dp"
                          app:cardBackgroundColor="@color/surface_3"
                          app:cardCornerRadius="16dp"
                          app:cardElevation="0dp">
                          <ImageView
                              android:id="@+id/appIcon"
                              android:layout_width="52dp"
                              android:layout_height="52dp"
                              android:padding="6dp"
                              android:scaleType="centerInside" />
                      </com.google.android.material.card.MaterialCardView>
                      <View
                          android:id="@+id/modDot"
                          android:layout_width="12dp"
                          android:layout_height="12dp"
                          android:layout_gravity="bottom|end"
                          android:layout_margin="1dp"
                          android:background="@drawable/ic_mod_dot"
                          android:visibility="gone" />
                  </FrameLayout>
                  <LinearLayout
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:orientation="vertical"
                      android:paddingStart="12dp"
                      android:paddingEnd="8dp">
                      <TextView
                          android:id="@+id/appName"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:textSize="15sp"
                          android:textStyle="bold"
                          android:textColor="@color/on_surface"
                          android:maxLines="1"
                          android:ellipsize="end" />
                      <TextView
                          android:id="@+id/packageName"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:textSize="12sp"
                          android:textColor="@color/on_surface_variant"
                          android:maxLines="1"
                          android:ellipsize="end"
                          android:layout_marginTop="2dp" />
                  </LinearLayout>
                  <com.google.android.material.chip.Chip
                      android:id="@+id/scaleBadge"
                      style="@style/Widget.MaterialComponents.Chip.Entry"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="80%"
                      android:textColor="@color/on_primary_container"
                      android:textSize="12sp"
                      app:chipBackgroundColor="@color/primary_container"
                      app:chipStrokeColor="@color/primary_dim"
                      app:chipStrokeWidth="1dp"
                      app:chipMinHeight="28dp"
                      android:visibility="gone" />
                  <!-- mantido por compatibilidade com AppListAdapter -->
                  <ImageView
                      android:id="@+id/modifiedIcon"
                      android:layout_width="0dp"
                      android:layout_height="0dp"
                      android:visibility="gone" />
              </LinearLayout>
          </com.google.android.material.card.MaterialCardView>
          EOF

      # ─────────────────────────────────────────
      # SETTINGS — cards clicáveis com IDs corretos
      # ─────────────────────────────────────────
      - name: Rewrite activity_settings.xml
        run: |
          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="@color/bg_amoled"
              android:fitsSystemWindows="true">

              <androidx.appcompat.widget.Toolbar
                  android:id="@+id/settingsToolbar"
                  android:layout_width="match_parent"
                  android:layout_height="?attr/actionBarSize"
                  android:background="@color/bg_amoled"
                  app:titleTextColor="@color/on_surface"
                  app:title="Operation Mode"
                  app:popupTheme="@style/ThemeOverlay.MaterialComponents.Dark" />

              <ScrollView
                  android:layout_width="match_parent"
                  android:layout_height="match_parent">
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"
                      android:padding="16dp">

                      <TextView
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:text="Escolha como o escalonamento de resolução é aplicado."
                          android:textSize="14sp"
                          android:textColor="@color/on_surface_variant"
                          android:paddingBottom="16dp" />

                      <!-- RadioGroup invisível — necessário para o Kotlin existente funcionar -->
                      <RadioGroup
                          android:id="@+id/radioGroupMode"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical">

                          <!-- CARD Modo Padrão -->
                          <com.google.android.material.card.MaterialCardView
                              android:id="@+id/cardDefault"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:layout_marginBottom="12dp"
                              app:cardBackgroundColor="@color/primary_container"
                              app:cardCornerRadius="24dp"
                              app:strokeColor="@color/primary"
                              app:strokeWidth="1.5dp"
                              app:cardElevation="0dp">
                              <LinearLayout
                                  android:layout_width="match_parent"
                                  android:layout_height="wrap_content"
                                  android:orientation="horizontal"
                                  android:padding="16dp">
                                  <RadioButton
                                      android:id="@+id/radioDefault"
                                      android:layout_width="wrap_content"
                                      android:layout_height="wrap_content"
                                      android:checked="true"
                                      android:buttonTint="@color/primary"
                                      android:layout_marginTop="2dp" />
                                  <LinearLayout
                                      android:layout_width="match_parent"
                                      android:layout_height="wrap_content"
                                      android:orientation="vertical"
                                      android:paddingStart="8dp">
                                      <TextView
                                          android:layout_width="wrap_content"
                                          android:layout_height="wrap_content"
                                          android:text="Default Mode"
                                          android:textSize="16sp"
                                          android:textStyle="bold"
                                          android:textColor="@color/on_primary_container"
                                          android:paddingBottom="8dp" />
                                      <TextView
                                          android:layout_width="match_parent"
                                          android:layout_height="wrap_content"
                                          android:text="• Usa comandos cmd game downscale\n• Recomendado para a maioria dos usuários\n• Funciona a partir do Android 14+\n• Mais estável e bem testado\n• Reaplicado automaticamente ao abrir o app"
                                          android:textSize="13sp"
                                          android:textColor="@color/on_primary_container"
                                          android:lineSpacingMultiplier="1.4" />
                                  </LinearLayout>
                              </LinearLayout>
                          </com.google.android.material.card.MaterialCardView>

                          <!-- CARD Modo Alternativo -->
                          <com.google.android.material.card.MaterialCardView
                              android:id="@+id/cardAlternative"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:layout_marginBottom="12dp"
                              app:cardBackgroundColor="@color/surface_2"
                              app:cardCornerRadius="24dp"
                              app:strokeColor="@color/outline"
                              app:strokeWidth="1.5dp"
                              app:cardElevation="0dp">
                              <LinearLayout
                                  android:layout_width="match_parent"
                                  android:layout_height="wrap_content"
                                  android:orientation="horizontal"
                                  android:padding="16dp">
                                  <RadioButton
                                      android:id="@+id/radioAlternative"
                                      android:layout_width="wrap_content"
                                      android:layout_height="wrap_content"
                                      android:buttonTint="@color/primary"
                                      android:layout_marginTop="2dp" />
                                  <LinearLayout
                                      android:layout_width="match_parent"
                                      android:layout_height="wrap_content"
                                      android:orientation="vertical"
                                      android:paddingStart="8dp">
                                      <TextView
                                          android:layout_width="wrap_content"
                                          android:layout_height="wrap_content"
                                          android:text="Alternative Mode"
                                          android:textSize="16sp"
                                          android:textStyle="bold"
                                          android:textColor="@color/on_surface"
                                          android:paddingBottom="8dp" />
                                      <TextView
                                          android:layout_width="match_parent"
                                          android:layout_height="wrap_content"
                                          android:text="• Usa comandos device_config game_overlay\n• Desabilita sincronização GMS\n• Suporte experimental para Android 13+\n• Pode não funcionar em todas as ROMs\n• Reaplicado automaticamente ao abrir o app"
                                          android:textSize="13sp"
                                          android:textColor="@color/on_surface_variant"
                                          android:lineSpacingMultiplier="1.4" />
                                  </LinearLayout>
                              </LinearLayout>
                          </com.google.android.material.card.MaterialCardView>

                      </RadioGroup>
                  </LinearLayout>
              </ScrollView>
          </LinearLayout>
          EOF

      # ─────────────────────────────────────────
      # DRAWABLE — ponto de modificado
      # ─────────────────────────────────────────
      - name: Create ic_mod_dot drawable
        run: |
          cat > app/src/main/res/drawable/ic_mod_dot.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="oval">
              <solid android:color="#FF00E5CC" />
              <stroke android:width="2dp" android:color="#FF000000" />
          </shape>
          EOF

      # ─────────────────────────────────────────
      # KOTLIN — MainActivity com dialog novo + banner dinâmico
      # ─────────────────────────────────────────
      - name: Rewrite MainActivity.kt
        run: |
          cat > app/src/main/java/com/game/reschange/MainActivity.kt << 'EOF'
          package com.game.reschange

          import android.content.Intent
          import android.content.pm.ApplicationInfo
          import android.content.pm.PackageManager
          import android.graphics.Color
          import android.os.Bundle
          import android.text.Editable
          import android.text.TextWatcher
          import android.view.Menu
          import android.view.MenuItem
          import android.view.View
          import android.widget.Button
          import android.widget.LinearLayout
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.view.WindowCompat
          import androidx.recyclerview.widget.LinearLayoutManager
          import androidx.recyclerview.widget.RecyclerView
          import com.google.android.material.bottomsheet.BottomSheetDialog
          import com.google.android.material.card.MaterialCardView
          import com.google.android.material.chip.Chip
          import com.google.android.material.chip.ChipGroup
          import com.google.android.material.slider.Slider
          import com.google.android.material.switchmaterial.SwitchMaterial
          import com.google.android.material.textfield.TextInputEditText
          import java.io.DataOutputStream
          import java.util.Locale

          class MainActivity : AppCompatActivity() {

              private lateinit var recyclerView: RecyclerView
              private lateinit var adapter: AppListAdapter
              private lateinit var toggleModified: SwitchMaterial
              private lateinit var allApps: List<AppInfo>
              private var showOnlyModified = false
              private var currentQuery: String = ""

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  WindowCompat.setDecorFitsSystemWindows(window, false)
                  setContentView(R.layout.activity_main)
                  setSupportActionBar(findViewById(R.id.myToolbar))

                  recyclerView   = findViewById(R.id.appList)
                  toggleModified = findViewById(R.id.toggleModified)
                  recyclerView.layoutManager = LinearLayoutManager(this)

                  allApps = getUserInstalledApps()
                  adapter = AppListAdapter(allApps) { appInfo ->
                      showResolutionBottomSheet(appInfo.packageName)
                  }
                  recyclerView.adapter = adapter

                  // Busca inline via TextInputEditText
                  findViewById<TextInputEditText>(R.id.searchInput)
                      .addTextChangedListener(object : TextWatcher {
                          override fun beforeTextChanged(s: CharSequence?, st: Int, c: Int, a: Int) {}
                          override fun onTextChanged(s: CharSequence?, st: Int, c: Int, a: Int) {
                              currentQuery = s?.toString().orEmpty()
                              filterAppList()
                          }
                          override fun afterTextChanged(s: Editable?) {}
                      })

                  // Chips de filtro
                  val chipGroup = findViewById<ChipGroup>(R.id.chipGroup)
                  chipGroup.setOnCheckedStateChangeListener { _, checkedIds ->
                      showOnlyModified = false
                      filterAppList()
                  }
                  // Chips individuais para controlar filtro
                  findViewById<Chip>(R.id.chipModified).setOnCheckedChangeListener { _, checked ->
                      if (checked) { showOnlyModified = true; filterAppList() }
                  }
                  findViewById<Chip>(R.id.chipAll).setOnCheckedChangeListener { _, checked ->
                      if (checked) { showOnlyModified = false; filterAppList() }
                  }

                  toggleModified.setOnCheckedChangeListener { _, isChecked ->
                      showOnlyModified = isChecked
                      filterAppList()
                  }

                  findViewById<Button>(R.id.resetButton).setOnClickListener {
                      val packages = ResChangePrefs.getAllPackages(this)
                      for (pkg in packages) {
                          runAsRoot(buildDisableCommand(pkg))
                          runAsRoot("am force-stop $pkg")
                      }
                      ResChangePrefs.clearAll(this)
                      adapter.notifyDataSetChanged()
                      Toast.makeText(this, "All resolutions reset to default", Toast.LENGTH_SHORT).show()
                  }

                  updateStatusBanner()
              }

              override fun onResume() {
                  super.onResume()
                  updateStatusBanner()
              }

              // Banner dinâmico: verifica se o módulo Xposed está ativo de verdade
              private fun updateStatusBanner() {
                  val banner   = findViewById<MaterialCardView>(R.id.statusBanner)
                  val label    = findViewById<TextView>(R.id.statusLabel)
                  val sub      = findViewById<TextView>(R.id.statusSub)
                  val modeStr  = if (ModePrefs.isAlternative(this)) "Modo Alternativo" else "Modo Padrão"

                  // XposedInit substitui esse valor se o módulo estiver ativo
                  val isActive = ModuleStatus.isActive

                  if (isActive) {
                      banner.setCardBackgroundColor(Color.parseColor("#FF003730"))
                      label.text = "Módulo Ativo"
                      label.setTextColor(Color.parseColor("#FF6FF7E8"))
                  } else {
                      banner.setCardBackgroundColor(Color.parseColor("#FF3B0008"))
                      label.text = "Módulo Inativo"
                      label.setTextColor(Color.parseColor("#FFFFB4AC"))
                  }
                  sub.text = "Xposed rodando · $modeStr"
              }

              override fun onCreateOptionsMenu(menu: Menu): Boolean {
                  menuInflater.inflate(R.menu.menu_main, menu)
                  // Remove item de busca do menu — busca agora é inline
                  menu.removeItem(R.id.action_search)
                  return true
              }

              override fun onOptionsItemSelected(item: MenuItem): Boolean {
                  if (item.itemId == R.id.action_settings) {
                      startActivity(Intent(this, SettingsActivity::class.java))
                      return true
                  }
                  return super.onOptionsItemSelected(item)
              }

              private fun filterAppList() {
                  var list = allApps
                  if (showOnlyModified)
                      list = list.filter { ResChangePrefs.getScale(this, it.packageName) < 1.0f }
                  if (currentQuery.isNotEmpty()) {
                      val q = currentQuery.lowercase(Locale.getDefault())
                      list = list.filter {
                          it.name.lowercase().contains(q) || it.packageName.lowercase().contains(q)
                      }
                  }
                  adapter.submitList(list)
              }

              private fun getUserInstalledApps(): List<AppInfo> {
                  val pm = packageManager
                  return pm.getInstalledApplications(PackageManager.GET_META_DATA)
                      .filter { app ->
                          (app.flags and ApplicationInfo.FLAG_SYSTEM) == 0 &&
                          app.packageName != packageName
                      }
                      .distinctBy { it.packageName }
                      .map { app ->
                          AppInfo(
                              name = pm.getApplicationLabel(app).toString(),
                              packageName = app.packageName,
                              icon = try { pm.getApplicationIcon(app) }
                                     catch (_: Exception) { pm.defaultActivityIcon }
                          )
                      }
                      .sortedBy { it.name.lowercase() }
              }

              // ── Bottom Sheet de resolução (visual baseado no HTML) ──────────
              private fun showResolutionBottomSheet(packageName: String) {
                  val savedScale = ResChangePrefs.getScale(this, packageName)
                  val isAlt      = ModePrefs.isAlternative(this)
                  val modeLabel  = if (isAlt) "Alternative Mode" else "Default Mode"
                  val appName    = allApps.find { it.packageName == packageName }?.name ?: packageName

                  val sheet = BottomSheetDialog(this, R.style.MyRoundedDialog)
                  val view  = layoutInflater.inflate(R.layout.sheet_resolution, null)
                  sheet.setContentView(view)

                  // Preenche header
                  view.findViewById<TextView>(R.id.sheetAppName).text = appName
                  view.findViewById<TextView>(R.id.sheetAppPkg).text  = packageName
                  view.findViewById<TextView>(R.id.sheetModeLabel).text = modeLabel

                  val scaleLabel = view.findViewById<TextView>(R.id.sheetScaleValue)
                  val slider     = view.findViewById<Slider>(R.id.sheetSlider)

                  slider.valueFrom    = 0.30f
                  slider.valueTo      = 1.00f
                  slider.stepSize     = 0.05f
                  slider.value        = savedScale
                  slider.isTickVisible = true
                  scaleLabel.text     = "${(savedScale * 100).toInt()}%"

                  slider.addOnChangeListener { _, value, _ ->
                      scaleLabel.text = "${(value * 100).toInt()}%"
                      val color = if (value >= 1.0f) Color.parseColor("#FF939393")
                                  else Color.parseColor("#FF00E5CC")
                      scaleLabel.setTextColor(color)
                  }

                  // Preset chips
                  val presets = listOf(50, 60, 70, 75, 80, 90)
                  val presetGroup = view.findViewById<ChipGroup>(R.id.sheetPresetChips)
                  presets.forEach { pct ->
                      val chip = Chip(this).apply {
                          text = "$pct%"
                          isCheckable = true
                          isChecked = (savedScale * 100).toInt() == pct
                          setTextColor(Color.parseColor("#FF939393"))
                          chipBackgroundColor = android.content.res.ColorStateList.valueOf(Color.TRANSPARENT)
                          chipStrokeColor = android.content.res.ColorStateList.valueOf(Color.parseColor("#FF303030"))
                          chipStrokeWidth = 4f
                          setOnClickListener {
                              slider.value = pct / 100f
                          }
                      }
                      presetGroup.addView(chip)
                  }

                  // Botões
                  view.findViewById<View>(R.id.btnApply).setOnClickListener {
                      var scale = String.format(Locale.US, "%.2f", slider.value).toFloat()
                      if (scale == 0.95f) {
                          scale = 0.9f
                          Toast.makeText(this, "95% não suportado. Usando 90%.", Toast.LENGTH_SHORT).show()
                      }
                      if (scale >= 1.0f) {
                          runAsRoot(buildDisableCommand(packageName))
                          ResChangePrefs.removeScale(this, packageName)
                          Toast.makeText(this, "Resolução resetada para $appName", Toast.LENGTH_SHORT).show()
                      } else {
                          runAsRoot(buildApplyCommand(packageName, scale))
                          ResChangePrefs.saveScale(this, packageName, scale)
                          Toast.makeText(this, "${(scale*100).toInt()}% aplicado para $appName", Toast.LENGTH_SHORT).show()
                      }
                      adapter.notifyDataSetChanged()
                      runAsRoot("am force-stop $packageName")
                      Toast.makeText(this, "$appName parado. Reabra para aplicar.", Toast.LENGTH_LONG).show()
                      sheet.dismiss()
                  }

                  view.findViewById<View>(R.id.btnReset).setOnClickListener {
                      runAsRoot(buildDisableCommand(packageName))
                      ResChangePrefs.removeScale(this, packageName)
                      adapter.notifyDataSetChanged()
                      runAsRoot("am force-stop $packageName")
                      Toast.makeText(this, "$appName resetado para 100%.", Toast.LENGTH_LONG).show()
                      sheet.dismiss()
                  }

                  view.findViewById<View>(R.id.btnCancel).setOnClickListener {
                      sheet.dismiss()
                  }

                  sheet.show()
              }

              private fun buildApplyCommand(pkg: String, scale: Float): String {
                  val scaleStr = String.format(Locale.US, "%.2f", scale)
                  return if (ModePrefs.isAlternative(this)) {
                      "device_config put game_overlay $pkg " +
                          "mode=2,downscaleFactor=$scaleStr:mode=3,downscaleFactor=$scaleStr"
                  } else {
                      "cmd game downscale $scaleStr $pkg 2>/dev/null; " +
                          "cmd game set --downscale $scaleStr $pkg 2>/dev/null"
                  }
              }

              private fun buildDisableCommand(pkg: String): String {
                  return if (ModePrefs.isAlternative(this)) {
                      "device_config delete game_overlay $pkg"
                  } else {
                      "cmd game downscale disable $pkg 2>/dev/null; " +
                          "cmd game set --downscale disable $pkg 2>/dev/null"
                  }
              }

              private fun runAsRoot(command: String) {
                  try {
                      val process = Runtime.getRuntime().exec("su")
                      val os = DataOutputStream(process.outputStream)
                      os.writeBytes("$command\n")
                      os.writeBytes("exit\n")
                      os.flush()
                      os.close()
                      process.waitFor()
                  } catch (e: Exception) {
                      Toast.makeText(this, "Root failed: ${e.message}", Toast.LENGTH_LONG).show()
                  }
              }
          }
          EOF

