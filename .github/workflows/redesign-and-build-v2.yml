      # KOTLIN — ModuleStatus (detecta se Xposed está ativo)
      # ─────────────────────────────────────────
      - name: Create ModuleStatus.kt
        run: |
          cat > app/src/main/java/com/game/reschange/ModuleStatus.kt << 'EOF'
          package com.game.reschange

          /**
           * O XposedInit do módulo substitui isActive = true em tempo de execução.
           * Se o módulo NÃO estiver ativo, esse valor permanece false.
           */
          object ModuleStatus {
              @JvmField
              var isActive: Boolean = false
          }
